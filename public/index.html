<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Ticketless Raffle
    </title>


    <link rel="stylesheet" href="/css/style.css">

</head>


<body>


<div class="container">


    <!-- Organization Header -->

    <header class="header">

        <div class="logo-placeholder">

            YOUR LOGO HERE

        </div>


        <h1>
            Ticketless Raffle
        </h1>


        <h2>
            Supporting Our Veterans
        </h2>

    </header>




    <!-- Entry Form -->

    <section class="card">


        <h3>
            Enter the Raffle
        </h3>



        <form id="raffleForm">


            <label>
                Name
            </label>


            <input

                type="text"

                id="name"

                placeholder="Enter your name"

                required

            >




            <label>
                Email (optional)
            </label>


            <input

                type="email"

                id="email"

                placeholder="Enter your email"

            >




            <label>
                Number of Entries
            </label>


            <div class="ticket-control">


                <button

                    type="button"

                    id="minus"

                >
                    -
                </button>



                <span id="ticketCount">
                    1
                </span>



                <button

                    type="button"

                    id="plus"

                >
                    +
                </button>


            </div>




            <button

                type="submit"

                class="enter-button"

            >

                ENTER RAFFLE

            </button>



        </form>



        <div id="message"></div>


    </section>





    <!-- Stats -->

    <section class="stats card">


        <h3>
            Current Raffle
        </h3>


        <p>
            Entrants:
            <span id="entrantCount">
                0
            </span>
        </p>


        <p>
            Total Entries:
            <span id="totalTickets">
                0
            </span>
        </p>


    </section>





    <footer>

        Thank you for supporting our veterans.

    </footer>



</div>



<script src="/js/app.js"></script>


</body>

</html>
