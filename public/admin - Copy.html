<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Ticketless Raffle Admin
    </title>


    <link rel="stylesheet" href="/css/admin.css">

</head>


<body>


<div class="container">



<header class="header">

    <h1>
        Ticketless Raffle Admin
    </h1>

    <h2>
        Veterans Nonprofit Dashboard
    </h2>

</header>

<!-- Admin Login -->

<section class="card" id="loginSection">


<h3>
    Admin Login
</h3>


<label>
    Password
</label>


<input
    id="adminPassword"
    type="password"
    placeholder="Enter admin password">


<button
    class="enter-button"
    id="loginButton">

    Login

</button>


<div id="loginMessage"></div>


</section>

<div id="dashboardSection" style="display:none;">

<!-- Dashboard Stats -->

<section class="card">

<h3>Raffle Statistics</h3>

<div class="stats-grid">

    <div class="stat-card">

        <div class="stat-title">
            Entrants
        </div>

        <div
            class="stat-number"
            id="entrantCount">

            0

        </div>

    </div>

    <div class="stat-card">

        <div class="stat-title">
            Total Entries
        </div>

        <div
            class="stat-number"
            id="totalTickets">

            0

        </div>

    </div>

    <div class="stat-card">

        <div class="stat-title">
            Winners
        </div>

        <div
            class="stat-number"
            id="winnerCount">

            0

        </div>

    </div>

</div>

</section>





<!-- Admin Actions -->

<section class="card">


<h3>
    Raffle Actions
</h3>


<button
    class="action-button action-add"
    id="addEntrantButton">

    ➕ Add Entrant

</button>

<button
    class="action-button action-draw"
    id="drawButton">

    🎉 Draw Winner

</button>

<button
    class="action-button action-export"
    id="exportButton">

    📄 Export CSV

</button>

<button
    class="action-button action-reset"
    id="resetButton">

    🔄 Reset Raffle

</button>



</section>








<!-- Add Entrant Form -->

<section
class="card"
id="addEntrantSection">

<form id="addEntrantForm">

<h3>
    Add Entrant Manually
</h3>

<label>
    Name
</label>


<input
    id="adminName"
    placeholder="Entrant name">





<label>
    Email
</label>


<input
    id="adminEmail"
    placeholder="Email (optional)">





<label>
    Number of Entries
</label>


<input
    id="adminTickets"
    type="number"
    value="1"
    min="1">

<button
class="enter-button"
id="saveEntrantButton"
type="button">

Save Entrant

</button>

<p id="adminMessage"></p>

</form>

</section>




<!-- Winner Display -->

<section class="card">


<h3>
    Latest Winner
</h3>


<div id="winnerDisplay">

No winner drawn yet.

</div>


</section>



<section class="card">

    <h3>Entrants</h3>

    <input
        type="text"
        id="searchEntrants"
        placeholder="Search entrants..."
    >

    <table id="entrantTable">

        <thead>

           <tr>

    <th>Name</th>
    <th>Email</th>
    <th>Entries</th>
    <th>Date Added</th>
    <th>Edit</th>
    <th>Delete</th>

</tr>

        </thead>

        <tbody id="entrantTableBody">

        </tbody>

    </table>

</section>



<!-- Winner History -->

<section class="card">


<h3>
    Winner History
</h3>


<div id="winnerHistory">

No winners yet.

</div>


</section>


<!-- ==========================================
     Edit Entrant Modal
========================================== -->

<div id="editModal" class="modal" style="display:none;">

    <div class="modal-content">

        <h2>Edit Entrant</h2>

        <input type="hidden" id="editId">

        <label>Name</label>

        <input
            type="text"
            id="editName">

        <label>Email</label>

        <input
            type="email"
            id="editEmail">

        <label>Tickets</label>

        <input
            type="number"
            id="editTickets"
            min="1">

        <br><br>

        <button id="saveEditButton">
            💾 Save
        </button>

        <button id="cancelEditButton">
            Cancel
        </button>

    </div>

</div>



</div>

</div>

<script src="/js/admin.js"></script>




</body>

</html>
